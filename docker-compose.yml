version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: banxue-backend
    ports:
      - "8001:8000"
    environment:
      - POSTGRES_HOST=4169f5ce8027_shortvideo-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=banxue_academy
    networks:
      - docker_default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banxue-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - docker_default

networks:
  docker_default:
    external: true
