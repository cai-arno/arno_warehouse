name: shortvideo_factory
description: 短视频工厂 - AI 驱动的短视频生产平台
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # 状态管理
  provider: ^6.1.1
  # 网络
  dio: ^5.4.0
  # 本地存储
  shared_preferences: ^2.2.2
  # UI 组件
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  # 工具
  intl: ^0.19.0
  go_router: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
